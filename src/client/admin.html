<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>이온로드 관리자</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .new-submission-banner{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--primary);color:#fff;font-weight:600;font-size:14px;border-radius:var(--radius-sm);margin-bottom:12px;animation:slideDown .3s ease}
      @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
      .new-submission-banner button{background:#fff;color:var(--primary);border:none;padding:6px 14px;border-radius:var(--radius-sm);font-weight:700;cursor:pointer;font-size:13px}
      .week-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
      .week-compare-item{display:flex;flex-direction:column;align-items:center;padding:12px;background:var(--bg);border-radius:var(--radius-sm)}
      .week-compare-item .wc-label{font-size:12px;color:var(--text-muted);font-weight:600}
      .week-compare-item .wc-value{font-size:24px;font-weight:800;color:var(--primary);margin:4px 0}
      .week-compare-delta{text-align:center;padding:8px;font-size:14px;font-weight:700;border-radius:var(--radius-sm)}
      .week-compare-delta.positive{background:#e8f5e9;color:#2e7d32}
      .week-compare-delta.negative{background:#ffeaea;color:#c62828}
      .week-compare-delta.neutral{background:var(--bg);color:var(--text-muted)}
      .chip-list{display:flex;flex-wrap:wrap;gap:6px}
      .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:16px;font-size:13px;font-weight:500}
      .chip button{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text-muted);padding:0 2px;line-height:1}
      .chip button:hover{color:var(--error)}
      .settings-group h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)}
      .product-card{padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:8px}
      .product-card .product-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
      .product-card .product-name{font-weight:700;font-size:14px}
      .product-card .product-brand{font-size:12px;color:var(--text-muted)}
      .product-card .size-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:12px;margin:2px}
      .product-card .size-chip button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-muted);padding:0;line-height:1}
      .product-card .size-chip button:hover{color:var(--error)}
      .product-card .add-size-row{display:flex;gap:4px;margin-top:6px}
      .product-card .add-size-row input{flex:1;font-size:12px;padding:4px 8px}
      .product-card .add-size-row button{font-size:12px;padding:4px 8px}
      .researcher-detail{display:none;padding:12px;margin-top:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);animation:slideDown .2s ease}
      .researcher-detail.open{display:block}
      .researcher-detail .rd-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
      .researcher-detail .rd-item{padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm)}
      .researcher-detail .rd-label{font-size:11px;color:var(--text-muted);font-weight:600}
      .researcher-detail .rd-value{font-size:16px;font-weight:800;color:var(--primary);margin-top:2px}
      .researcher-detail .rd-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
      .researcher-detail .rd-tag{padding:2px 8px;background:var(--primary);color:#fff;border-radius:12px;font-size:11px;font-weight:600}
      .researcher-detail .rd-recent{margin-top:10px}
      .researcher-detail .rd-recent-item{padding:6px 8px;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between}
      .researcher-detail .rd-recent-item:last-child{border-bottom:none}
      .area-card[data-researcher]{cursor:pointer}
      .area-card[data-researcher]:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
      .trend-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
      .trend-bar-label{min-width:90px;font-size:12px;font-weight:600;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
      .trend-bar-track{flex:1;height:22px;background:var(--border);border-radius:6px;overflow:hidden;position:relative}
      .trend-bar-fill{height:100%;border-radius:6px;transition:width .4s ease}
      .trend-bar-value{min-width:60px;font-size:12px;font-weight:700;color:var(--primary);text-align:right}
      .trend-bar-fill.outlier{background:var(--error)!important}
      .trend-stats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
      .trend-stat{padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);text-align:center;flex:1;min-width:80px}
      .trend-stat .ts-label{font-size:11px;color:var(--text-muted);font-weight:600}
      .trend-stat .ts-value{font-size:18px;font-weight:800;color:var(--primary);margin-top:2px}
      .group-bar-section{display:grid;gap:12px}
      .group-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
      .group-bar-label{min-width:100px;font-size:13px;font-weight:600;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .group-bar-bars{flex:1;display:flex;gap:3px;align-items:end;height:28px}
      .group-bar-seg{height:100%;border-radius:4px;transition:width .4s ease;position:relative}
      .group-bar-seg:hover::after{content:attr(data-tip);position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:10}
      .group-bar-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
      .group-bar-legend-item{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500}
      .group-bar-legend-dot{width:10px;height:10px;border-radius:3px}
      .group-bar-insight{margin-top:10px;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);font-size:13px;color:var(--text);line-height:1.6}
      .heatmap-grid{display:grid;grid-template-columns:50px repeat(24,1fr);gap:2px;overflow-x:auto}
      .heatmap-header{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;padding:2px 0}
      .heatmap-day-label{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
      .heatmap-cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text-muted);transition:background .2s;cursor:default;min-width:16px}
      .heatmap-cell:hover{outline:2px solid var(--primary);z-index:1}
      .region-table{width:100%;border-collapse:collapse;font-size:13px}
      .region-table th{padding:10px 8px;text-align:left;border-bottom:2px solid var(--border);font-weight:700;cursor:pointer;user-select:none;white-space:nowrap}
      .region-table th:hover{color:var(--primary)}
      .region-table th .sort-arrow{margin-left:4px;font-size:10px}
      .region-table td{padding:8px;border-bottom:1px solid var(--border)}
      .region-table tr:hover td{background:var(--bg)}
      .admin-tab{flex:1;padding:10px 8px;border:none;background:none;font-size:14px;font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:color .2s,border-color .2s}
      .admin-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
      .admin-tab:hover{color:var(--primary)}
      @media print{
        .status-bar,.logout-btn,#login-section,#csv-btn,#backup-btn,.filter-bar,#submission-list,.sub-actions,.btn,.btn-submit,.new-submission-banner,#researcher-stats,.no-print,#settings-section,#price-trend-section,#chart-activity-heatmap{display:none!important}
        #admin-section{display:block!important}
        #admin-section .hidden{display:block!important}
        body{background:#fff;color:#000;font-size:12pt}
        .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
        .quick-stats{break-inside:avoid}
        #charts-section{break-before:auto}
        #charts-section .card{break-inside:avoid;page-break-inside:avoid}
        h1::after{content:" - 인쇄일: " attr(data-print-date);font-size:12pt;font-weight:400}
        .print-summary-section{display:block!important}
        .print-summary-section .card{break-inside:avoid;page-break-inside:avoid}
      }
    </style>
  </head>
  <body>
    <div class="status-bar">
      <span>이온로드 관리자 🔒</span>
      <button id="logout-btn" class="logout-btn hidden">로그아웃</button>
    </div>

    <main class="shell">
      <section id="login-section">
        <header class="hero">
          <p class="eyebrow">이온로드 🔒</p>
          <h1>관리자 로그인</h1>
          <p class="subhead">관리자 비밀번호를 입력해주세요.</p>
        </header>
        <div class="card stack">
          <div class="field">
            <label>비밀번호</label>
            <input type="password" id="password-input" placeholder="비밀번호를 입력하세요" />
          </div>
          <button class="btn-submit" id="login-btn">관리자 로그인</button>
          <div id="login-error" class="small text-center" style="color:var(--error)"></div>
        </div>
      </section>

      <section id="admin-section" class="hidden">
        <div id="new-submission-banner"></div>
        <header class="hero">
          <p class="eyebrow">이온로드 관리자 🔒</p>
          <h1 id="admin-title">관리자 대시보드</h1>
        </header>

        <div id="admin-stats" class="quick-stats"></div>

        <div class="admin-tabs" style="display:flex;gap:0;margin-top:12px;position:sticky;top:0;z-index:50;background:var(--bg);padding:4px 0;border-bottom:2px solid var(--border);">
          <button class="admin-tab active" data-tab="stats">📊 통계</button>
          <button class="admin-tab" data-tab="records">📋 기록</button>
          <button class="admin-tab" data-tab="settings">⚙️ 설정</button>
        </div>

        <!-- TAB: 통계 -->
        <div id="tab-stats" class="admin-tab-panel">
          <div id="charts-section" style="display:grid;gap:12px;margin-top:12px;">
            <div class="card stack" id="chart-daily"></div>
            <div class="card stack" id="chart-researcher"></div>
            <div class="card stack" id="chart-area"></div>
            <div class="card stack" id="chart-quality"></div>
          </div>

          <div id="chart-store-product" class="card stack" style="margin-top:12px;"></div>
          <div id="chart-activity-heatmap" class="card stack" style="margin-top:12px;"></div>
          <div id="chart-region-compare" class="card stack" style="margin-top:12px;"></div>

          <div id="week-compare-section" class="card stack" style="margin-top:12px;"></div>

          <div id="researcher-stats" class="card stack" style="margin-top:12px;"></div>

          <div id="price-trend-section" class="card stack" style="margin-top:12px;">
            <h2>가격 트렌드 📈</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
              <select id="trend-product" style="flex:1;min-width:120px;">
                <option value="">제품 선택</option>
              </select>
              <select id="trend-size" style="flex:1;min-width:120px;">
                <option value="">사이즈 선택</option>
              </select>
            </div>
            <div id="trend-chart"></div>
          </div>

          <div style="margin-top:12px;">
            <button class="btn btn-secondary no-print" id="summary-btn" style="width:100%;">📊 요약 보기</button>
          </div>
        </div>

        <!-- TAB: 기록 -->
        <div id="tab-records" class="admin-tab-panel" style="display:none;">
          <div class="card stack" style="margin-top:12px;">
            <div class="admin-header">
              <h2>전체 기록 📋</h2>
              <p class="hint">기록을 확인하고 담당 지역을 조정하거나 삭제할 수 있어요.</p>
            </div>
            <div id="admin-filter" class="filter-bar"></div>
            <div id="submission-list" class="stack"></div>
          </div>
        </div>

        <!-- TAB: 설정 -->
        <div id="tab-settings" class="admin-tab-panel" style="display:none;">
          <div class="card stack" style="margin-top:12px;">
            <h2>내보내기 / 가져오기 💾</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-primary" id="csv-btn" style="flex:1;">📥 CSV 다운로드</button>
              <button class="btn btn-secondary" id="backup-btn" style="flex:1;">백업 (JSON)</button>
              <button class="btn btn-secondary no-print" id="print-btn" style="flex:1;">🖨️ 인쇄</button>
            </div>
            <div style="margin-top:12px;">
              <button class="btn btn-secondary" id="import-btn" style="width:100%;">📤 데이터 가져오기</button>
              <input type="file" id="import-file" accept=".json" style="display:none;" />
            </div>
          </div>

          <div id="settings-section" class="card stack" style="margin-top:12px;">
            <h2>설정 ⚙️</h2>

            <div id="settings-areas" class="settings-group">
              <h3>지역 관리</h3>
              <div id="area-chips" class="chip-list"></div>
              <div style="display:flex;gap:6px;margin-top:8px;">
                <input type="text" id="new-area-input" placeholder="새 지역명" style="flex:1;" />
                <button class="btn btn-primary" id="add-area-btn">추가</button>
              </div>
            </div>

            <div id="settings-store-types" class="settings-group" style="margin-top:16px;">
              <h3>매장유형 관리</h3>
              <div id="store-type-chips" class="chip-list"></div>
              <div style="display:flex;gap:6px;margin-top:8px;">
                <input type="text" id="new-store-type-label" placeholder="매장유형명" style="flex:1;" />
                <input type="number" id="new-store-type-pos" placeholder="기본 POS" style="width:80px;" min="0" value="1" />
                <button class="btn btn-primary" id="add-store-type-btn">추가</button>
              </div>
            </div>

            <div id="settings-products" class="settings-group" style="margin-top:16px;">
              <h3>제품 관리</h3>
              <div id="product-list-manage"></div>
              <div style="display:grid;gap:6px;margin-top:8px;">
                <input type="text" id="new-product-label" placeholder="제품명" />
                <select id="new-product-brand">
                  <option value="광동제약">자사 (광동제약)</option>
                  <option value="경쟁사">경쟁사</option>
                </select>
                <input type="text" id="new-product-sizes" placeholder="사이즈 (쉼표 구분, 예: 캔 240ml, PET 500ml)" />
                <button class="btn btn-primary" id="add-product-btn">제품 추가</button>
              </div>
            </div>
          </div>

          <div class="card stack" style="margin-top:12px;">
            <h2>비밀번호 변경 🔑</h2>
            <div style="display:grid;gap:8px;">
              <div class="field">
                <label>현재 비밀번호</label>
                <input type="password" id="current-password" placeholder="현재 비밀번호" />
              </div>
              <div class="field">
                <label>새 비밀번호</label>
                <input type="password" id="new-password" placeholder="새 비밀번호 (4자 이상)" />
              </div>
              <button class="btn btn-primary" id="change-password-btn">비밀번호 변경</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
