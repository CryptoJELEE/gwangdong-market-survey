<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>이온로드 - 현장 기록</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="status-bar">
      <span class="gps-status" id="gps-status">위치 찾는 중...</span>
      <span class="researcher-name" id="status-researcher"></span>
    </div>

    <main class="shell">
      <header class="hero">
        <p class="eyebrow">이온로드 🏃</p>
        <h1>오늘도 현장을 달려볼까요?</h1>
        <p class="subhead">현장의 눈이 되어주셔서 감사합니다 🏃</p>
      </header>

      <section id="survey" class="panel is-active">
        <div id="step-indicator" class="step-indicator"></div>
        <form id="survey-form">
          <div id="form-step-container"></div>
        </form>
        <div id="success-view" class="card hidden"></div>
      </section>

      <section id="dashboard" class="panel">
        <div id="quick-stats" class="quick-stats"></div>

        <div class="card stack" style="margin-top:12px;">
          <div>
            <h2>🗺️ 현장 지도</h2>
            <p class="hint">기록된 매장과 조사자 거주지를 지도에서 확인해요.</p>
          </div>
          <div id="map-container" style="width:100%;height:350px;border-radius:10px;"></div>
          <div id="map-legend" class="map-legend"></div>
        </div>

        <div id="product-leaderboard" class="card stack" style="margin-top:12px;"></div>

        <div id="area-stats-grid" style="margin-top:12px;"></div>

        <div id="recent-activity" class="card stack" style="margin-top:12px;"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-tab is-active" data-tab="survey">
        <span class="nav-icon">&#x1F4CD;</span>
        <span>현장기록</span>
      </button>
      <button class="nav-tab" data-tab="dashboard">
        <span class="nav-icon">&#x1F4CA;</span>
        <span>대시보드</span>
      </button>
    </nav>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cd597c4c6f2cb58323e670a8bcef366b&autoload=false&libraries=services,clusterer"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
